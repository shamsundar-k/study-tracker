services:
  - type: web
    name: study-tracker
    runtime: node
    rootDir: .
    buildCommand: npm install && npm run build
    startCommand: node server/dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false        # Set manually in Render dashboard — never commit secrets
      - key: JWT_SECRET
        sync: false        # Set manually in Render dashboard

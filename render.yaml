services:
  # ── Backend — Express API ────────────────────────────────────────────────────
  - type: web
    name: study-tracker-server
    runtime: node
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false        # Set manually in Render dashboard — never commit secrets
      - key: JWT_SECRET
        sync: false        # Set manually in Render dashboard
      - key: CLIENT_URL
        sync: false        # Set to your Render static site URL after frontend is deployed

  # ── Frontend — React SPA ─────────────────────────────────────────────────────
  - type: web
    name: study-tracker-client
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html   # Required for React Router client-side routing
